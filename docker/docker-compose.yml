# Local single-node Elasticsearch for offline telco-agent demos.
# Usage: docker compose -f docker/docker-compose.yml up -d

name: telco-agent

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: telco-agent-elasticsearch
    restart: unless-stopped
    environment:
      node.name: telco-es01
      cluster.name: telco-agent-local
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - telco_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s

volumes:
  telco_es_data:
    name: telco_agent_es_data
